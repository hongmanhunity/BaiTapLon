name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Checkout WinmartMVC repository
      uses: actions/checkout@v4
      with:
        repository: hongmanhunity/WinmartMVC 
        path: ../WinmartMVC
        # LƯU Ý: Nếu repo WinmartMVC để ở chế độ Private (Riêng tư), 
        # bạn cần dùng Personal Access Token (PAT) bỏ comment dòng dưới:
        # token: ${{ secrets.PAT_TOKEN }}

    - name: Build Docker Images
      run: docker-compose build

    - name: Start Docker Services
      run: docker-compose up -d

    - name: Check Container Status
      run: |
        # Chờ vài giây để các container khởi động hoàn toàn
        sleep 5
        docker-compose ps
        
        # Kiểm tra xem có container nào bị thoát (Exit) không
        if [ "$(docker-compose ps -q | xargs docker inspect -f '{{ .State.Running }}' | grep false)" ]; then
          echo "Một số container không thể khởi động!"
          docker-compose logs
          exit 1
        else
          echo "Tất cả các container đã chạy thành công."
        fi
